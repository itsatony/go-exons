name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test -v -race ./...

      - name: Build CLI binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/exons-linux-amd64 ./cmd/exons/
          GOOS=linux GOARCH=arm64 go build -o dist/exons-linux-arm64 ./cmd/exons/
          GOOS=darwin GOARCH=amd64 go build -o dist/exons-darwin-amd64 ./cmd/exons/
          GOOS=darwin GOARCH=arm64 go build -o dist/exons-darwin-arm64 ./cmd/exons/
          GOOS=windows GOARCH=amd64 go build -o dist/exons-windows-amd64.exe ./cmd/exons/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
